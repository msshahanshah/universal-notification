openapi: 3.0.3
info:
  title: Universal Notifier API
  description: |
    API specification for the Universal Notifier.
  version: 1.0.0

servers:
  - url: /
    description: Base URL is automatically detected from the request

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Auth ────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: abcdef@xyz
        password:
          type: string
          minLength: 8
          example: Pass1234

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          description: Refresh token must be a non-empty string

    # ─── Notification (v1) ───────────────────────────────────────────────────
    NotifySms:
      type: object
      required:
        - service
        - message
        - destination
      properties:
        service:
          type: string
          enum: [sms]
          example: sms
          description: Notification service type must be sms
        message:
          type: string
          minLength: 1
          example: Hello Rahul, how are you
        destination:
          type: string
          pattern: '^\+[0-9]+$'
          example: '+919103324482,+919109224482'
          description: |
            Comma-separated list of phone numbers in E.164 format (+<countryCode><number>).
            Duplicate numbers are not allowed.

    NotifySlack:
      type: object
      required:
        - service
        - message
        - destination
      properties:
        service:
          type: string
          enum: [slack]
          example: slack
          description: Notification service type must be slack
        message:
          type: string
          minLength: 1
          example: Good Morning, Guys
        destination:
          type: string
          pattern: '^[CGD][A-Z0-9]{8,10}$'
          minLength: 9
          maxLength: 11
          example: C08Q1E38E10R,G09A1B2C3D
          description: |
            Comma-separated list of Slack channel IDs. Each ID must start with
            C (public), G (private), or D (Direct Message). Duplicate IDs are not allowed.

    NotifyEmail:
      type: object
      required:
        - service
        - destination
        - subject
        - body
        - fromEmail
      properties:
        service:
          type: string
          enum: [email]
          example: email
          description: Notification service type must be email
        destination:
          type: string
          example: test@gmail.com
          description: |
            Comma-separated list of destination email addresses. Duplicates allowed.
        fromEmail:
          type: string
          example: test@gmail.com
          description: |
            Sender email. Required if the client is allowed to set a custom from-address.
        subject:
          type: string
          minLength: 1
          maxLength: 255
          example: Important Update
        body:
          type: string
          minLength: 1
          example: Good Morning Dikshant, Please look into this email.
        cc:
          type: string
          example: 'test@gmail.com, test2@gmail.com'
          description: (Optional) Comma-separated CC email addresses.
        bcc:
          type: string
          example: 'test@gmail.com, test2@gmail.com'
          description: (Optional) Comma-separated BCC email addresses.
        attachments:
          type: array
          description: (Optional) Array of file names or attachment objects. Max 10 items.
          items:
            type: string

    NotifyEmailWithFileAttachment:
      type: object
      required:
        - service
        - destination
        - subject
        - body
        - fromEmail
        - attachments
      properties:
        service:
          type: string
          enum: [email]
          example: email
        destination:
          type: string
          example: test@gmail.com
        fromEmail:
          type: string
          example: test@gmail.com
        subject:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
          example: Good Morning Dikshant, Please look into this email.
        cc:
          type: string
          example: 'test@gmail.com, test2@gmail.com'
        bcc:
          type: string
          example: 'test@gmail.com, test2@gmail.com'
        attachments:
          type: array
          example: ['file1.png', 'file2.pdf']
          description: Array of file names. Max 10 items.
          items:
            type: string

    NotifyEmailWithS3FileAttachment:
      type: object
      required:
        - service
        - destination
        - subject
        - body
        - fromEmail
        - attachments
      properties:
        service:
          type: string
          enum: [email]
          example: email
        destination:
          type: string
          example: test@gmail.com
        fromEmail:
          type: string
          example: test@gmail.com
        subject:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
          example: Good Morning Dikshant, Please look into this email.
        cc:
          type: string
          example: 'test@gmail.com, test2@gmail.com'
        bcc:
          type: string
          example: 'test@gmail.com, test2@gmail.com'
        attachments:
          type: array
          description: Array of objects with filename and url. Max 10 items.
          example:
            - { filename: 'file_1.png', url: 'https://aws_url_1.com' }
            - { filename: 'file_2.png', url: 'https://aws_url_2.com' }
          items:
            type: object
            required: [filename, url]
            properties:
              filename:
                type: string
              url:
                type: string
                format: uri

    # ─── Notification (v2) ───────────────────────────────────────────────────
    NotifyV2Request:
      type: object
      description: |
        Multi-service notification request payload.

        ### Validation Rules
        - Maximum payload size: **100 KB** — returns `413` if exceeded
        - Maximum **5** messages per service
        - If both `message` and `commonMessage` are missing → `400`
        - If `attachments` are present but `uniqueKey` is missing → `400`
        - If duplicate `uniqueKey` exists in same request → `400`
        - If messages exceed configured limit → `400`
      properties:
        commonMessage:
          type: string
          description: Fallback message used when an individual service entry has no message/body.
          example: 'This is a common message'
        templateId:
          type: string
          description: Optional template ID to apply before sending.
          example: '7ec67efd-21e1-4189-aa8e-25686a6f8845'
        variables:
          type: object
          description: Template variable values (required when templateId is provided).
          additionalProperties: true
          example:
            name: 'Rahul'
            orderId: '12345'
        sms:
          type: array
          description: List of SMS notifications (max 5)
          maxItems: 5
          items:
            type: object
            required:
              - destination
            properties:
              destination:
                type: string
                description: Recipient phone number in E.164 format
                example: '+919876543210'
              message:
                type: string
                description: Optional SMS message. Falls back to `commonMessage` if not provided.
                example: 'Hello, your order has been shipped.'
          example:
            - destination: '+919876543210'
              message: 'Hello Rahul, your order has been shipped.'
            - destination: '+919123456789'
              message: 'Hello Priya, your appointment is confirmed.'
        slack:
          type: array
          description: List of Slack notifications (max 5)
          maxItems: 5
          items:
            type: object
            required:
              - destination
            properties:
              destination:
                type: string
                description: Valid Slack Channel ID
                example: 'C08Q1E38E10R'
              message:
                type: string
                description: Optional Slack message. Falls back to `commonMessage` if not provided.
                example: 'Hello, your order has been shipped.'
          example:
            - destination: 'C08Q1E38E10R'
              message: 'Hello Rahul, your order has been shipped.'
        email:
          type: array
          description: List of Email notifications (max 5)
          maxItems: 5
          items:
            type: object
            required:
              - destination
              - subject
            properties:
              destination:
                type: string
                format: email
                description: Recipient email address
                example: 'user@example.com'
              subject:
                type: string
                description: Email subject line
                example: 'Order Confirmation'
              body:
                type: string
                description: Optional email body. Falls back to `commonMessage` if not provided.
                example: 'Hi, your order has been confirmed.'
              fromEmail:
                type: string
                format: email
                description: Sender email address (if client is permitted to override).
                example: 'noreply@company.com'
              uniqueKey:
                type: string
                description: Required if `attachments` are present. Must be unique within the request.
                example: 'email-1'
              attachments:
                type: array
                description: List of attachment file names to be uploaded via pre-signed URL.
                items:
                  type: string
                example:
                  - 'invoice.pdf'
                  - 'receipt.png'
          example:
            - destination: 'alice@example.com'
              subject: 'Order Confirmation'
              body: 'Hi Alice, your order #1001 has been confirmed.'
              fromEmail: 'noreply@company.com'
              uniqueKey: 'email-1'
              attachments:
                - 'invoice.pdf'
                - 'receipt.png'
            - destination: 'bob@example.com'
              subject: 'Shipment Update'
              body: 'Hi Bob, your order #1002 has been shipped.'
              fromEmail: 'noreply@company.com'
              uniqueKey: 'email-2'
        whatsapp:
          type: array
          description: List of WhatsApp notifications (max 5)
          maxItems: 5
          items:
            type: object
            required:
              - destination
            properties:
              destination:
                type: string
                description: Recipient WhatsApp number in E.164 format
                example: '+919929797900'
              message:
                type: string
                description: Optional WhatsApp text message
              attachments:
                type: array
                description: List of public media URLs
                items:
                  type: string
                  example: 'https://example.com/file.pdf'
              templateId:
                type: string
                description: WhatsApp template identifier
              contentVariables:
                type: object
                description: Template variable mapping (string → string)
                additionalProperties:
                  type: string
                example:
                  '1': 'value1'
                  '2': 'value2'
          example:
            - destination: '+919929797900'
              message: 'Hello!'
            - destination: '+919929797900'
              attachments:
                - 'https://example.com/file.pdf'
            - destination: '+919929797900'
              templateId: 'templateId'
              contentVariables:
                '1': 'value1'
                '2': 'value2'

    NotifyV2Response:
      type: object
      properties:
        data:
          type: object
          properties:
            failed:
              type: array
              description: List of failed service notifications
              items:
                $ref: '#/components/schemas/V2ServiceFailure'
            success:
              type: array
              description: List of successfully processed service notifications
              items:
                $ref: '#/components/schemas/V2ServiceSuccess'
          example:
            failed: []
            success:
              - service: email
                messageIds:
                  - 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
                preSignedUrls:
                  - uniqueKey: 'email-1'
                    urls:
                      - fileName: 'invoice.pdf'
                        s3:
                          url: 'https://bucket.s3.ap-south-1.amazonaws.com/'
                          fields:
                            bucket: 'bucket'
                            key: 'uploads/CLIENT/msg-uuid-1/invoice.pdf'
                            X-Amz-Algorithm: 'AWS4-HMAC-SHA256'
                            X-Amz-Signature: 'abc123'
              - service: sms
                messageIds:
                  - 'b2c3d4e5-f6a7-8901-bcde-f12345678901'

    V2ServiceSuccess:
      type: object
      properties:
        service:
          type: string
          enum: [email, sms, slack, whatsapp]
          example: email
        messageIds:
          type: array
          items:
            type: string
            format: uuid
          example:
            - 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
        preSignedUrls:
          type: array
          description: Present only for services with file attachments (email, whatsapp)
          items:
            $ref: '#/components/schemas/V2PreSignedUrlGroup'

    V2ServiceFailure:
      type: object
      properties:
        service:
          type: string
          enum: [email, sms, slack, whatsapp]
          example: sms
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: 'Bulk insert failed'

    V2PreSignedUrlGroup:
      type: object
      properties:
        uniqueKey:
          type: string
          example: 'email-1'
        urls:
          type: array
          items:
            $ref: '#/components/schemas/V2PreSignedUrl'

    V2PreSignedUrl:
      type: object
      properties:
        fileName:
          type: string
          example: 'invoice.pdf'
        s3:
          type: object
          properties:
            url:
              type: string
              format: uri
              example: 'https://bucket.s3.ap-south-1.amazonaws.com/'
            fields:
              type: object
              additionalProperties:
                type: string

    PreSignedUrlResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Waiting for file upload on URL (expiry 5 mins). Message Id: 24af1e92-cfa3-4c25-9d13-79841734f1ee'
        preSignedUrls:
          type: array
          items:
            $ref: '#/components/schemas/V2PreSignedUrl'

    # ─── Template ────────────────────────────────────────────────────────────
    TemplateRequest:
      type: object
      required:
        - service
        - name
        - messageContent
      properties:
        service:
          type: string
          enum: [slack, sms, email, whatsapp]
          example: email
        templateId:
          type: string
          example: '7ec67efd-21e1-4189-aa8e-25686a6f8845'
          description: |
            External template ID (e.g., for SMS/WhatsApp providers). When provided,
            the `variables` field becomes required.
        name:
          type: string
          minLength: 3
          maxLength: 20
          example: 'Welcome_Template'
        messageContent:
          type: string
          example: 'Hello {{name}}, welcome to our service!'
        variables:
          type: array
          description: Required when `templateId` is provided.
          items:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                example: 'name'
              constraints:
                type: object
                properties:
                  maxlength:
                    oneOf:
                      - type: string
                      - type: number
                  dataType:
                    type: string
                  required:
                    type: boolean

    TemplateResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        templateId:
          type: string
          example: '7ec67efd-21e1-4119-aa8e-25686a6f8845'
        service:
          type: string
          example: 'email'
        name:
          type: string
          example: 'welcome_template'
        messageContent:
          type: string
          example: 'https://bucket-name.s3.region.amazonaws.com/templates/client-id/template-id.html'
        requiredFields:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Routing Rules ───────────────────────────────────────────────────────
    RoutingRuleRequest:
      type: object
      required:
        - service
        - provider
        - matchKey
        - matchValue
      properties:
        service:
          type: string
          enum: [email, slack, sms, whatsapp]
          example: email
        provider:
          type: string
          example: AWS_SES
        matchKey:
          type: string
          example: DOMAIN
        matchValue:
          type: string
          example: gmail.com
          description: |
            - email: Valid email address or domain name.
            - sms/whatsapp: Valid country calling code (e.g., 91).
            - slack: Valid Slack channel, group, or DM ID (e.g., C0123ABC456).

    RoutingRuleResponse:
      type: object
      properties:
        id:
          type: integer
        service:
          type: string
          example: EMAIL
        provider:
          type: string
          example: AWS_SES
        match_key:
          type: string
          example: DOMAIN
        match_value:
          type: string
          example: gmail.com
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoutingRuleListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        rows:
          type: array
          items:
            $ref: '#/components/schemas/RoutingRuleResponse'
        total:
          type: integer
        currentPage:
          type: integer
        totalPages:
          type: integer

    # ─── Common ──────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      description: |
        Standard error response.

        ⚠️ If the error is related to headers, ensure:
        - `X-Client-Id` header is present and matches the authenticated user's client ID.
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'error details'

# ─── Reusable Parameters ─────────────────────────────────────────────────────
  parameters:
    ClientIdHeader:
      name: X-Client-Id
      in: header
      required: true
      schema:
        type: string
      description: Unique client identifier. Must match the authenticated user.

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:
  # ── System ─────────────────────────────────────────────────────────────────
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service is healthy

  # ── Auth ───────────────────────────────────────────────────────────────────
  /login:
    post:
      summary: User login
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/ClientIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: login successful
                  data:
                    type: object
                    properties:
                      refreshToken:
                        type: string
                      accessToken:
                        type: string
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/ClientIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: refresh successful
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logout:
    post:
      summary: Logout
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdHeader'
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logout successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Notification ───────────────────────────────────────────────────────────
  /notify:
    post:
      summary: Send a notification (SMS / Slack / Email)
      tags: [Notification]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/NotifySms'
                - $ref: '#/components/schemas/NotifySlack'
                - $ref: '#/components/schemas/NotifyEmail'
              discriminator:
                propertyName: service
            examples:
              sms:
                summary: SMS Notification
                value:
                  service: sms
                  message: 'Hello Rahul, how are you'
                  destination: '+919929797900'
              slack:
                summary: Slack Notification
                value:
                  service: slack
                  message: 'Good Morning, Guys'
                  destination: 'C08Q1239E10R'
              email:
                summary: Email Notification
                value:
                  service: email
                  destination: 'user@example.com'
                  subject: 'Recent Mail'
                  body: 'Email body content'
                  fromEmail: 'sender@example.com'
                  cc: 'itest@gmail.com'
                  bcc: 'itest@gmail.com'
      responses:
        '202':
          description: Notification accepted and queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
                  message:
                    type: string
                    example: Notification request accepted and queued.
                  messageId:
                    type: string
                    example: '7ec67efd-21e1-4189-aa8e-25686a6f8845'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notify-with-attachment:
    post:
      summary: Send an email notification with file attachment (pre-signed S3 upload)
      tags: [Notification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotifyEmailWithFileAttachment'
      responses:
        '200':
          description: Pre-signed upload URL returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreSignedUrlResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/notify:
    post:
      summary: Send multi-service notifications (V2)
      tags: [Notification]
      security:
        - bearerAuth: []
      operationId: notifyV2
      description: |
        Sends notifications across multiple services (SMS, Email, Slack, WhatsApp) in one request.

        ### Constraints
        - Maximum payload size: **100 KB** — returns `413` if exceeded
        - Maximum **5** messages per service
        - If both `message` and `commonMessage` are missing → `400`
        - If `attachments` are present without `uniqueKey` → `400`
        - Duplicate `uniqueKey` in same request → `400`
        - Messages exceeding configured limit → `400`
      parameters:
        - $ref: '#/components/parameters/ClientIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotifyV2Request'
      responses:
        '200':
          description: All notifications processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotifyV2Response'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload Too Large (exceeds 100 KB limit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '417':
          description: |
            Expectation Failed — partial success. Some services processed successfully,
            others failed. Response body contains both `data.success` and `data.failed`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotifyV2Response'
              example:
                data:
                  failed:
                    - service: sms
                      statusCode: 400
                      message: 'Bulk insert failed'
                  success:
                    - service: email
                      messageIds:
                        - 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Delivery Status ────────────────────────────────────────────────────────
  /delivery-status/{messageId}:
    get:
      summary: Get delivery status of a message
      tags: [Status]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdHeader'
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
