deliveryStatusId:
  get:
    summary: Get delivery status of a message
    tags: [Status]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../index.yaml#/components/parameters/ClientIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Message ID (UUID) of the notification
    responses:
      "200":
        description: Delivery status returned
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: object
                  properties:
                    messageId:
                      type: string
                    deliveryStatus:
                      type: string
                      example: pending
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "404":
        description: Message ID not found
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
            example:
              success: false
              message: "Message ID not found"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"

logs:
  get:
    summary: Get notification logs
    tags: [Logs]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../index.yaml#/components/parameters/ClientIdHeader"
      - name: status
        in: query
        schema:
          type: string
          enum: [pending, processing, failed, sent]
      - name: service
        in: query
        schema:
          type: string
          enum: [slack, email, sms, whatsapp]
      - name: page
        in: query
        schema:
          type: integer
          minimum: 0
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 0
      - name: order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order for results
      - name: sort
        in: query
        schema:
          type: string
        description: Field to sort by
      - name: message
        in: query
        schema:
          type: string
        description: Filter by message content
      - name: destination
        in: query
        schema:
          type: string
        description: Filter by destination
      - name: attempts
        in: query
        schema:
          type: integer
        description: Filter by number of delivery attempts
      - name: cc
        in: query
        schema:
          type: string
        description: Filter by CC email address
      - name: bcc
        in: query
        schema:
          type: string
        description: Filter by BCC email address
      - name: fromEmail
        in: query
        schema:
          type: string
        description: Filter by sender email address
      - name: from-date
        in: query
        schema:
          type: string
          format: date-time
        description: Filter logs from this date (ISO 8601)
      - name: to-date
        in: query
        schema:
          type: string
          format: date-time
        description: Filter logs up to this date (ISO 8601)
    responses:
      "200":
        description: Logs fetched successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Data fetched successfully
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: number
                      messageId:
                        type: string
                      service:
                        type: string
                      destination:
                        type: string
                      status:
                        type: string
                      attempts:
                        type: number
                      messageDate:
                        type: string
                        format: date-time
                      referenceId:
                        type: string
                pagination:
                  type: object
                  properties:
                    page:
                      type: number
                    limit:
                      type: number
                    totalPages:
                      type: number
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"

slackLogs:
  get:
    summary: Get Slack notification logs including reply messages
    tags: [Logs]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../index.yaml#/components/parameters/ClientIdHeader"
      - name: status
        in: query
        schema:
          type: string
          enum: [pending, processing, failed, sent]
      - name: page
        in: query
        schema:
          type: integer
          minimum: 0
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 0
      - name: order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order for results
      - name: sort
        in: query
        schema:
          type: string
        description: Field to sort by
      - name: message
        in: query
        schema:
          type: string
        description: Filter by message content
      - name: destination
        in: query
        schema:
          type: string
        description: Filter by destination
      - name: attempts
        in: query
        schema:
          type: integer
        description: Filter by number of delivery attempts
      - name: from-date
        in: query
        schema:
          type: string
          format: date-time
        description: Filter logs from this date (ISO 8601)
      - name: to-date
        in: query
        schema:
          type: string
          format: date-time
        description: Filter logs up to this date (ISO 8601)
    responses:
      "200":
        description: Slack logs fetched successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Data fetched successfully
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: number
                      messageId:
                        type: string
                      service:
                        type: string
                      destination:
                        type: string
                      status:
                        type: string
                      attempts:
                        type: number
                      messageDate:
                        type: string
                        format: date-time
                      referenceId:
                        type: string
                      userReplyedMessages:
                        type: object
                        properties:
                          username:
                            type: string
                            example: "john_doe"
                          message:
                            type: string
                            example: "Thanks for the reply!"
                          reactions:
                            type: array
                            items:
                              type: string
                            example: ["+1", "white_check_mark"]
                pagination:
                  type: object
                  properties:
                    page:
                      type: number
                    limit:
                      type: number
                    totalPages:
                      type: number
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
