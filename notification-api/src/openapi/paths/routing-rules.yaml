routingRules:
  get:
    summary: List and search routing rules
    tags: [Routing Rules]
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../index.yaml#/components/parameters/ClientIdHeader'
      - name: service
        in: query
        schema:
          type: string
          enum: [email, slack, sms, whatsapp]
      - name: provider
        in: query
        schema:
          type: string
      - name: matchKey
        in: query
        schema:
          type: string
      - name: matchValue
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
    responses:
      '200':
        description: Routing rules fetched successfully
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/RoutingRuleListResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'

  post:
    summary: Create a routing rule
    tags: [Routing Rules]
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../index.yaml#/components/parameters/ClientIdHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../index.yaml#/components/schemas/RoutingRuleRequest'
    responses:
      '201':
        description: Routing rule created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Routing rule created successfully
                data:
                  $ref: '../index.yaml#/components/schemas/RoutingRuleResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'

routingRulesId:
  parameters:
    - name: ruleId
      in: path
      required: true
      schema:
        type: integer
      description: Internal database ID of the routing rule

  put:
    summary: Update a routing rule
    tags: [Routing Rules]
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../index.yaml#/components/parameters/ClientIdHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../index.yaml#/components/schemas/RoutingRuleRequest'
    responses:
      '200':
        description: Routing rule updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Routing rule updated successfully
                data:
                  $ref: '../index.yaml#/components/schemas/RoutingRuleResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Routing rule not found
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'

  delete:
    summary: Delete a routing rule
    tags: [Routing Rules]
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../index.yaml#/components/parameters/ClientIdHeader'
    responses:
      '200':
        description: Routing rule deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Routing rule deleted successfully
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Routing rule not found
        content:
          application/json:
            schema:
              $ref: '../index.yaml#/components/schemas/ErrorResponse'
