login:
  post:
    summary: User login
    tags: [Auth]
    parameters:
      - $ref: "../index.yaml#/components/parameters/ClientIdHeader"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../index.yaml#/components/schemas/LoginRequest"
    responses:
      "200":
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: login successful
                data:
                  type: object
                  properties:
                    refreshToken:
                      type: string
                    accessToken:
                      type: string
      "400":
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"

refresh:
  post:
    summary: Refresh access token
    tags: [Auth]
    parameters:
      - $ref: "../index.yaml#/components/parameters/ClientIdHeader"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
                example: "your-refresh-token-here"
    responses:
      "200":
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: refresh successful
                data:
                  type: object
                  properties:
                    accessToken:
                      type: string
      "401":
        description: Invalid refresh token
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"

logout:
  post:
    summary: Logout
    tags: [Auth]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../index.yaml#/components/parameters/ClientIdHeader"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
                example: "your-refresh-token-here"
    responses:
      "200":
        description: Logout successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Logout successfully
      "401":
        description: Invalid refresh token
        content:
          application/json:
            schema:
              $ref: "../index.yaml#/components/schemas/ErrorResponse"
